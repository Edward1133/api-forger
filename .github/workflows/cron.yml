name: Run Daily
on:
  schedule: [{cron: '0 2 * * *'}]
  workflow_dispatch:
jobs:
  evolve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: pip install requests
      - run: python main.py
        env: {GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}}
      - run: |
          git config user.name forge-bot
          git config user.email bot@users.noreply.github.com
          git add.
          git diff --quiet && git diff --staged --quiet || git commit -m "v$(jq -r.version state.json): auto-evolve"
          git push

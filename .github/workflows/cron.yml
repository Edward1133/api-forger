name: Run Daily
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  evolve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - run: pip install requests
      
      - run: python main.py
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          
      - id: get_version
        run: echo "ver=$(python -c 'import json; print(json.load(open("state.json"))["version"])')" >> $GITHUB_OUTPUT
        
      - run: |
          git config user.name forge-bot
          git config user.email bot@users.noreply.github.com
          git add .
          git diff --staged --quiet || git commit -m "v${{ steps.get_version.outputs.ver }}: auto-evolve"
          git push
